<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — NexusLearn AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 420px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .cached-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 0.75rem;
      font-size: 0.85rem;
      color: #cbd5e1;
    }
    .feature-icon { font-size: 1.2rem; margin-bottom: 0.25rem; }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛜</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features are still available from your local cache.</p>
    <div class="cached-features">
      <div class="feature">
        <div class="feature-icon">📝</div>
        Notes
      </div>
      <div class="feature">
        <div class="feature-icon">🗂️</div>
        Flashcards
      </div>
      <div class="feature">
        <div class="feature-icon">📚</div>
        Materials
      </div>
      <div class="feature">
        <div class="feature-icon">🗺️</div>
        Campus Map
      </div>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
